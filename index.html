<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clue — Bloc de Pistas</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Clue">
<meta name="theme-color" content="#0a0806">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   TOKENS
═══════════════════════════════════════ */
:root {
  --bg:        #0a0806;
  --surf:      #13100a;
  --surf2:     #1a1409;
  --surf3:     #211a0c;
  --bord:      #4a3214;
  --bord2:     #6a4820;
  --gold:      #c8901e;
  --goldf:     #f0b840;
  --goldff:    #ffe08a;
  --cream:     #f4e8c8;
  --dim:       #8a6a3a;
  --xc:        #ff3a3a;
  --xbg:       rgba(200,30,30,0.60);
  --xbg2:      rgba(160,20,20,0.40);
  --cc:        #28e872;
  --cbg:       rgba(22,160,65,0.60);
  --qc:        #c855ff;
  --row-h:     34px;
  --lbl-w:     88px;
  --col-w:     62px;
  --header-h:  42px;
  --pbar-h:    36px;
  --radius:    8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--cream); font-family: 'Crimson Text', Georgia, serif; }

/* ═══════════════════════════════════════
   BACKGROUND TEXTURE
═══════════════════════════════════════ */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(ellipse 80% 60% at 15% 10%, rgba(180,80,10,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 85% 90%, rgba(120,20,160,0.05) 0%, transparent 70%);
}

/* ═══════════════════════════════════════
   TOP BAR
═══════════════════════════════════════ */
#topbar {
  position: relative; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px; gap: 8px;
  height: var(--header-h);
  background: linear-gradient(180deg, #16100a 0%, #0e0b06 100%);
  border-bottom: 1px solid var(--bord2);
  box-shadow: 0 2px 12px rgba(0,0,0,0.6);
}

#topbar h1 {
  font-family: 'Cinzel', serif; font-weight: 900;
  font-size: 1rem; letter-spacing: .18em;
  background: linear-gradient(135deg, var(--goldff) 0%, var(--goldf) 40%, var(--gold) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 8px rgba(240,184,64,0.3));
  white-space: nowrap; flex-shrink: 0;
}

.topbar-right { display: flex; align-items: center; gap: 6px; }

.legend {
  display: flex; gap: 8px; align-items: center;
  font-size: 0.68rem; font-weight: 600; color: var(--dim);
}
.legend span { display: flex; align-items: center; gap: 3px; }
.lx { color: var(--xc); font-size: 0.8rem; }
.lc { color: var(--cc); font-size: 0.8rem; }
.lq { color: var(--qc); font-size: 0.8rem; }

.tbtn {
  display: flex; align-items: center; justify-content: center; gap: 4px;
  background: linear-gradient(135deg, #2a1a08, #1e1005);
  border: 1px solid var(--bord2); color: var(--goldf);
  font-size: 0.62rem; font-weight: 700; font-family: 'Cinzel', serif;
  padding: 4px 9px; border-radius: 5px; cursor: pointer;
  letter-spacing: .08em; white-space: nowrap;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,224,138,0.08);
  transition: filter .15s, transform .1s;
}
.tbtn:active { transform: scale(0.95); filter: brightness(1.2); }
.tbtn.danger { color: #ff8888; border-color: #5a1a1a; }

/* ═══════════════════════════════════════
   PLAYER BAR
═══════════════════════════════════════ */
#pbar {
  position: relative; z-index: 90;
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  padding: 4px 12px;
  background: linear-gradient(180deg, #1a1409 0%, #13100a 100%);
  border-bottom: 1px solid var(--bord);
  min-height: var(--pbar-h);
}

#pbar-label {
  font-family: 'Cinzel', serif; font-size: 0.55rem; font-weight: 600;
  color: var(--gold); letter-spacing: .14em; white-space: nowrap;
}

#playersRow { display: flex; gap: 4px; flex-wrap: wrap; }

.pslot { display: flex; align-items: center; gap: 2px; }
.pslot input {
  background: var(--surf3);
  border: 1px solid var(--bord);
  border-radius: 4px; color: var(--cream);
  font-family: 'Crimson Text', serif; font-size: 0.8rem; font-weight: 600;
  padding: 2px 6px; width: 72px; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.pslot input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 2px rgba(200,144,30,0.2);
}
.pslot input::placeholder { color: var(--dim); font-style: italic; font-weight: 400; }

.prm {
  background: none; border: none; color: #cc3030;
  font-size: 0.9rem; font-weight: 900; cursor: pointer;
  padding: 0 2px; line-height: 1; transition: color .15s;
}
.prm:active { color: var(--xc); }

#btnAdd {
  background: none;
  border: 1px dashed var(--bord2); color: var(--goldf);
  font-size: 0.65rem; font-weight: 700; font-family: 'Cinzel', serif;
  padding: 2px 8px; border-radius: 4px; cursor: pointer;
  white-space: nowrap; transition: border-color .2s;
}
#btnAdd:active { border-color: var(--goldf); }

/* ═══════════════════════════════════════
   RANDOMIZE TOAST
═══════════════════════════════════════ */
#toast {
  position: fixed; top: 52px; left: 50%; transform: translateX(-50%) translateY(-10px);
  background: linear-gradient(135deg, #2a1a06, #1a1004);
  border: 1px solid var(--goldf); border-radius: 6px;
  padding: 6px 16px; font-size: 0.72rem; font-weight: 600;
  color: var(--goldf); letter-spacing: .05em;
  box-shadow: 0 4px 20px rgba(0,0,0,0.7);
  opacity: 0; pointer-events: none;
  transition: opacity .3s, transform .3s;
  z-index: 500; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ═══════════════════════════════════════
   TABLE SCROLL
═══════════════════════════════════════ */
#tscroll {
  position: relative; z-index: 1;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}
#tscroll::-webkit-scrollbar { width: 3px; height: 3px; }
#tscroll::-webkit-scrollbar-thumb { background: var(--bord2); border-radius: 2px; }

table {
  border-collapse: collapse;
  width: max-content; min-width: 100%;
  background: var(--surf);
}

/* ═══════════════════════════════════════
   CORNER
═══════════════════════════════════════ */
th.corner {
  background: linear-gradient(135deg, #0e0b06, #130f08);
  border-right: 2px solid var(--gold);
  border-bottom: 2px solid var(--gold);
  width: var(--lbl-w); min-width: var(--lbl-w); max-width: var(--lbl-w);
  padding: 3px 6px;
  font-family: 'Cinzel', serif; font-size: 0.42rem;
  color: var(--dim); letter-spacing: .07em;
  text-align: left; vertical-align: bottom;
  position: sticky; top: 0; left: 0; z-index: 50;
}

/* ═══════════════════════════════════════
   PLAYER COLUMN HEADERS
═══════════════════════════════════════ */
th.pcol {
  background: linear-gradient(180deg, #1e1508 0%, #14100a 100%);
  font-family: 'Cinzel', serif; font-size: 0.62rem; font-weight: 600;
  letter-spacing: .05em; color: var(--goldf);
  text-align: center; padding: 3px 2px;
  border-left: 1px solid var(--bord);
  border-bottom: 2px solid var(--gold);
  width: var(--col-w); min-width: var(--col-w); max-width: var(--col-w);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  vertical-align: bottom;
  position: sticky; top: 0; z-index: 40;
}
th.pcol.shuffled { color: var(--dim); font-style: italic; letter-spacing: .02em; }

/* ═══════════════════════════════════════
   SECTION HEADER ROWS
═══════════════════════════════════════ */
tr.sec td {
  background: linear-gradient(90deg, #1e1208 0%, #16100a 100%);
  font-family: 'Cinzel', serif; font-size: 0.6rem; font-weight: 600;
  letter-spacing: .14em; color: var(--goldf);
  padding: 4px 6px; height: 22px;
  border-top: 1px solid var(--bord2);
  border-bottom: 1px solid var(--bord);
}
tr.sec td:first-child {
  border-right: 2px solid var(--gold);
  position: sticky; left: 0; z-index: 30;
}
tr.sec td.fill { border-left: 1px solid var(--bord); }

/* ═══════════════════════════════════════
   ROW LABELS
═══════════════════════════════════════ */
td.rlabel {
  font-family: 'Crimson Text', serif;
  font-size: 0.78rem; font-weight: 600; color: var(--cream);
  padding: 0 6px;
  width: var(--lbl-w); min-width: var(--lbl-w); max-width: var(--lbl-w);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  border-right: 2px solid var(--gold);
  border-bottom: 1px solid rgba(74,50,20,0.45);
  background: var(--surf2);
  position: sticky; left: 0; z-index: 20;
  height: var(--row-h); vertical-align: middle;
}
tr:hover td.rlabel { background: #221a0c; }

/* ═══════════════════════════════════════
   DATA CELLS
═══════════════════════════════════════ */
td.cell {
  width: var(--col-w); min-width: var(--col-w); max-width: var(--col-w);
  height: var(--row-h);
  text-align: center; vertical-align: middle;
  border-left: 1px solid rgba(74,50,20,0.4);
  border-bottom: 1px solid rgba(74,50,20,0.3);
  padding: 0; transition: background .2s;
}
tr:nth-child(even) td.cell { background: rgba(255,255,255,0.012); }

td.cell.st-x     { background: var(--xbg)  !important; }
td.cell.st-check { background: var(--cbg)  !important; }
td.cell.st-radj  { background: var(--xbg2) !important; }

/* ═══════════════════════════════════════
   ICON GRID
═══════════════════════════════════════ */
.cicons {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  width: 100%; height: 100%;
}

.ibtn {
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; font-weight: 900; line-height: 1;
  border: none; background: transparent;
  cursor: pointer; user-select: none; padding: 0;
  height: 100%; width: 100%;
  -webkit-tap-highlight-color: transparent;
  transition: transform .07s;
  position: relative;
}
.ibtn:active { transform: scale(1.5); }

/* Inactive — faint ghost */
.ibtn.xbtn { color: var(--xc); opacity: 0.15; }
.ibtn.chk  { color: var(--cc); opacity: 0.15; }
.ibtn.qbtn { color: var(--qc); opacity: 0.15; }

/* Active — full glow */
.ibtn.xbtn.on {
  opacity: 1;
  text-shadow: 0 0 5px var(--xc), 0 0 14px rgba(255,58,58,0.5);
}
.ibtn.chk.on {
  opacity: 1;
  text-shadow: 0 0 5px var(--cc), 0 0 14px rgba(40,232,114,0.5);
}
.ibtn.qbtn.on {
  opacity: 1;
  text-shadow: 0 0 5px var(--qc), 0 0 14px rgba(200,85,255,0.5);
}

/* Q badge */
.qwrap {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  height: 100%; width: 100%;
}
.qbadge {
  position: absolute; top: 1px; right: 1px;
  background: var(--qc); color: #fff;
  font-size: 0.55rem; font-weight: 900;
  border-radius: 50%; width: 14px; height: 14px;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  box-shadow: 0 0 6px rgba(200,85,255,0.8), 0 0 12px rgba(200,85,255,0.4);
  border: 1px solid rgba(255,255,255,0.25);
  line-height: 1;
}

/* ═══════════════════════════════════════
   DIVIDER LINE between sections
═══════════════════════════════════════ */
tr.sec-gap td {
  height: 3px; padding: 0;
  background: linear-gradient(90deg, transparent, rgba(200,144,30,0.15), transparent);
  border: none;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <h1>🕯 CLUE</h1>
  <div class="legend">
    <span><span class="lx">✕</span>nadie</span>
    <span><span class="lc">✔</span>lo tiene</span>
    <span><span class="lq">?</span>duda</span>
  </div>
  <div class="topbar-right">
    <button class="tbtn" onclick="randomizeCols()" title="Mezcla el orden de las columnas para despistar">🔀 Mezclar</button>
    <button class="tbtn danger" onclick="resetAll()">↺</button>
  </div>
</div>

<!-- PLAYER BAR -->
<div id="pbar">
  <span id="pbar-label">JUGADORES</span>
  <div id="playersRow"></div>
  <button id="btnAdd" onclick="addPlayer()">＋ Jugador</button>
</div>

<!-- TOAST -->
<div id="toast">🔀 Columnas mezcladas</div>

<!-- TABLE -->
<div id="tscroll">
  <table id="mainTable"></table>
</div>

<script>
/* ═══════════════════════════
   DATA
═══════════════════════════ */
const SECTIONS_BASE = [
  { title: '🔪 SOSPECHOSOS', items: ['Escarlata','Mostaza','Verduzco','Marlene','Moradillo','Blanca'] },
  { title: '🗡 ARMAS',        items: ['Candelabro','Llave Ing.','Soga','Tubo Plomo','Revólver','Daga'] },
  { title: '🏛 LUGARES',      items: ['Sala','Cocina','Billar','Terraza','Comedor','Biblioteca','Estudio','Pasillo','S.Baile'] }
];
// rowOrder[si] = current display order (array of indices into SECTIONS_BASE[si].items)
let rowOrder = SECTIONS_BASE.map(s => s.items.map((_,i)=>i));
function getSections() {
  return SECTIONS_BASE.map((sec,si) => ({
    title: sec.title,
    items: rowOrder[si].map(idx => sec.items[idx]),
    keys:  rowOrder[si].map(idx => `s${si}_i${idx}`)
  }));
}

let state   = {};            // state[rowKey][colIdx] = {x,check,q}
let players = ['','','',''];
// colOrder: array of player indices in current display order
let colOrder = [0,1,2,3];

/* ═══════════════════════════
   STATE HELPERS
═══════════════════════════ */
function pname(i)  { return players[i]?.trim() || `J${i+1}`; }
function gs(rk, ci) {
  if (!state[rk])   state[rk]   = {};
  if (!state[rk][ci]) state[rk][ci] = {x:false,check:false,q:0};
  return state[rk][ci];
}

/* ═══════════════════════════
   ACTIONS
═══════════════════════════ */
function toggleX(rk) {
  const allX = players.every((_,ci) => gs(rk,ci).x && !gs(rk,ci).check);
  players.forEach((_,ci) => {
    const s = gs(rk,ci);
    if (allX) { s.x=false; }
    else       { s.x=true; s.check=false; s.q=0; }
  });
  refreshRow(rk);
}

function toggleCheck(rk, ci) {
  const was = gs(rk,ci).check;
  players.forEach((_,i) => { const s=gs(rk,i); s.check=false; s.x=false; });
  if (!was) {
    gs(rk,ci).check = true;
    players.forEach((_,i) => { if (i!==ci) gs(rk,i).x=true; });
  }
  refreshRow(rk);
}

function toggleQ(rk, ci) {
  const s = gs(rk,ci);
  s.q = (s.q+1)%5;
  const td = document.getElementById(`c_${rk}_${ci}`);
  if (td) buildCell(td, rk, ci);
}

function cellCls(rk, ci) {
  const s = gs(rk,ci);
  if (s.check) return 'st-check';
  if (s.x) return players.some((_,i)=>gs(rk,i).check) ? 'st-radj' : 'st-x';
  return '';
}

/* ═══════════════════════════
   RANDOMIZE ROWS
═══════════════════════════ */
function randomizeCols() {
  SECTIONS_BASE.forEach((_,si) => {
    const arr = rowOrder[si];
    for (let i = arr.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
  });
  renderTable();
  showToast('🔀 Filas mezcladas — ¡nadie sabe el orden!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ═══════════════════════════
   BUILD ONE CELL
═══════════════════════════ */
function buildCell(td, rk, ci) {
  const s = gs(rk,ci);
  td.className = 'cell ' + cellCls(rk,ci);
  td.innerHTML = '';
  const wrap = document.createElement('div'); wrap.className = 'cicons';

  // X
  const xb = document.createElement('button');
  xb.className = 'ibtn xbtn' + ((s.x||s.check)?' on':'');
  xb.textContent = '✕';
  xb.onclick = e => { e.stopPropagation(); toggleX(rk); };
  wrap.appendChild(xb);

  // CHECK
  const chk = document.createElement('button');
  chk.className = 'ibtn chk' + (s.check?' on':'');
  chk.textContent = '✔';
  chk.onclick = e => { e.stopPropagation(); toggleCheck(rk,ci); };
  wrap.appendChild(chk);

  // Q
  const qw = document.createElement('div'); qw.className = 'qwrap';
  const qb = document.createElement('button');
  qb.className = 'ibtn qbtn' + (s.q>0?' on':'');
  qb.textContent = '?';
  qb.onclick = e => { e.stopPropagation(); toggleQ(rk,ci); };
  qw.appendChild(qb);
  if (s.q>0) {
    const badge = document.createElement('span');
    badge.className='qbadge'; badge.textContent=s.q; qw.appendChild(badge);
  }
  wrap.appendChild(qw);
  td.appendChild(wrap);
}

function refreshRow(rk) {
  players.forEach((_,ci)=>{
    const td=document.getElementById(`c_${rk}_${ci}`);
    if(td) buildCell(td,rk,ci);
  });
}

/* ═══════════════════════════
   PLAYER MANAGEMENT
═══════════════════════════ */
function addPlayer() {
  if (players.length >= 6) return;
  const ni = players.length;
  players.push('');
  colOrder.push(ni);
  renderAll();
}

function removePlayer(i) {
  if (players.length <= 1) return;
  players.splice(i,1);
  // rebuild colOrder: remove i, remap higher indices
  colOrder = colOrder
    .filter(c => c !== i)
    .map(c => c > i ? c-1 : c);
  // clean state
  Object.keys(state).forEach(rk => { delete state[rk][i]; });
  renderAll();
}

/* ═══════════════════════════
   RENDER PLAYERS BAR
═══════════════════════════ */
function renderPlayers() {
  const row = document.getElementById('playersRow');
  row.innerHTML = '';
  players.forEach((name,i) => {
    const slot = document.createElement('div'); slot.className='pslot';
    const inp  = document.createElement('input');
    inp.type='text'; inp.maxLength=12; inp.value=name;
    inp.placeholder = i===0?'Yo':`J${i+1}`;
    inp.oninput = e => {
      players[i]=e.target.value;
      // update every th that shows this player
      document.querySelectorAll(`th.pcol[data-real="${i}"]`).forEach(th=>{
        th.textContent=pname(i);
      });
    };
    slot.appendChild(inp);
    if (players.length>1) {
      const rm=document.createElement('button'); rm.className='prm'; rm.textContent='×';
      rm.onclick=()=>removePlayer(i); slot.appendChild(rm);
    }
    row.appendChild(slot);
  });
}

/* ═══════════════════════════
   RENDER TABLE
═══════════════════════════ */
function renderTable() {
  const table = document.getElementById('mainTable');
  table.innerHTML='';

  // adjust scroll height
  const usedH = document.getElementById('topbar').offsetHeight +
                document.getElementById('pbar').offsetHeight;
  document.getElementById('tscroll').style.height = `calc(100vh - ${usedH}px)`;

  const nc = colOrder.length;

  // THEAD
  const thead=document.createElement('thead');
  const hr=document.createElement('tr');
  const corner=document.createElement('th'); corner.className='corner'; corner.textContent='↓ carta / jugador →';
  hr.appendChild(corner);
  colOrder.forEach((realIdx,displayPos) => {
    const th=document.createElement('th');
    th.className='pcol'; th.dataset.real=realIdx; th.dataset.pos=displayPos;
    th.textContent=pname(realIdx);
    hr.appendChild(th);
  });
  thead.appendChild(hr); table.appendChild(thead);

  // TBODY
  const tbody=document.createElement('tbody');
  getSections().forEach((sec,si)=>{
    // section row
    const srow=document.createElement('tr'); srow.className='sec';
    const std=document.createElement('td'); std.textContent=sec.title; srow.appendChild(std);
    for(let c=0;c<nc;c++){const fd=document.createElement('td');fd.className='fill';srow.appendChild(fd);}
    tbody.appendChild(srow);

    sec.items.forEach((item,ii)=>{
      const rk=sec.keys[ii];
      const tr=document.createElement('tr');
      const lbl=document.createElement('td');
      lbl.className='rlabel'; lbl.textContent=item; lbl.title=SECTIONS_BASE[si].items[rowOrder[si][ii]];
      tr.appendChild(lbl);

      colOrder.forEach(ci=>{
        const td=document.createElement('td');
        td.id=`c_${rk}_${ci}`;
        buildCell(td,rk,ci);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  });
  table.appendChild(tbody);
}

/* ═══════════════════════════
   RENDER ALL
═══════════════════════════ */
function renderAll() { renderPlayers(); renderTable(); }

/* ═══════════════════════════
   RESET
═══════════════════════════ */
function resetAll() {
